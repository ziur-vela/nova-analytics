services:
  app:
    build: .
    container_name: nova-app
    ports:
      - "8102:3000"
    environment:
      DATABASE_URL: postgresql://nova:nova@postgres:5432/nova
      NOVA_ADMIN_TOKEN: ${NOVA_ADMIN_TOKEN}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: nova-postgres
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    volumes:
      - nova_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  nova_pg_data:
